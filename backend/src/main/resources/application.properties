spring.application.name=codemap-backend

# ── Server ──────────────────────────────────────────────────────────────────
server.port=8080

# ── Database (switch to Postgres by setting the postgres profile) ────────────
# Default: H2 in-memory for local dev without Postgres
spring.datasource.url=jdbc:h2:mem:codemap;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# ── Gemini ───────────────────────────────────────────────────────────────────
# Set GEMINI_API_KEY environment variable — never hardcode here
gemini.api-key=${GEMINI_API_KEY:demo-key-not-set}
gemini.model=gemini-2.5-flash-lite
gemini.max-tokens=4096

# ── CORS — allow the Vite dev server ────────────────────────────────────────
codemap.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:4173}

# ── Actuator ─────────────────────────────────────────────────────────────────
# Expose health, metrics, and prometheus. Auth added in production.
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=always
management.endpoint.health.probes.enabled=true
management.metrics.tags.application=${spring.application.name}

# ── Logging ──────────────────────────────────────────────────────────────────
logging.level.com.codemap=DEBUG
logging.level.org.springframework.web=INFO
