# Activate with: --spring.profiles.active=postgres
# Or: SPRING_PROFILES_ACTIVE=postgres

spring.datasource.url=jdbc:postgresql://localhost:5432/codemap
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=${DB_USERNAME:codemap}
spring.datasource.password=${DB_PASSWORD:codemap}
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.h2.console.enabled=false
spring.jpa.hibernate.ddl-auto=update
