name: Deploy Backend → OCI

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - '.github/workflows/deploy-backend.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: SSH into OCI, pull & build on server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.OCI_HOST }}
          username: ${{ secrets.OCI_USERNAME }}
          key: ${{ secrets.OCI_SSH_KEY }}
          command_timeout: 15m
          script: |
            set -e

            # Install Maven if not present
            if ! command -v mvn &> /dev/null; then
              echo "Installing Maven..."
              sudo dnf install -y maven
            fi

            # Clone repo on first deploy, pull on subsequent ones
            if [ ! -d "/home/opc/codemap/repo" ]; then
              echo "Cloning repo..."
              git clone https://github.com/kirtimaya/CodeMap.git /home/opc/codemap/repo
            else
              echo "Pulling latest changes..."
              cd /home/opc/codemap/repo && git pull
            fi

            # Build the JAR on the server (no file transfer needed)
            echo "Building JAR..."
            cd /home/opc/codemap/repo/backend
            mvn package -DskipTests -q

            # Deploy
            cp target/codemap-backend-*.jar /home/opc/codemap/codemap-backend.jar
            sudo systemctl restart codemap
            sleep 5

            # Verify
            sudo systemctl is-active --quiet codemap \
              && echo "Service started OK" \
              || (sudo journalctl -u codemap --no-pager -n 50 && exit 1)
