name: Deploy Backend → OCI

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - '.github/workflows/deploy-backend.yml'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build JAR
        working-directory: backend
        run: mvn package -DskipTests -q

      - name: Copy JAR to OCI
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.OCI_HOST }}
          username: ${{ secrets.OCI_USERNAME }}
          key: ${{ secrets.OCI_SSH_KEY }}
          source: backend/target/codemap-backend-*.jar
          target: /home/opc/codemap/
          strip_components: 2

      - name: Rename JAR and restart service
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.OCI_HOST }}
          username: ${{ secrets.OCI_USERNAME }}
          key: ${{ secrets.OCI_SSH_KEY }}
          script: |
            mv /home/opc/codemap/codemap-backend-*.jar \
               /home/opc/codemap/codemap-backend.jar
            sudo systemctl restart codemap
            sleep 5
            sudo systemctl is-active --quiet codemap \
              && echo "Service started OK" \
              || (sudo journalctl -u codemap --no-pager -n 50 && exit 1)
